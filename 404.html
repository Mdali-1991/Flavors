<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found | Flavours Pan Asian Food</title>
  <meta name="description" content="The page you were looking for could not be found. Return to Flavours Pan Asian Food." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    /* ── RESET ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --fire: #E8400C;
      --gold: #D4A017;
      --dark: #0D0D0D;
      --surface: #111111;
      --text: #F5F0E8;
      --muted: #9A9080;
    }
    html { scroll-behavior: smooth; font-size: 16px; }
    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    em { font-style: italic; color: var(--gold); font-family: 'Playfair Display', serif; }
    a { color: inherit; text-decoration: none; }

    /* ── COUNTDOWN ── */
    #countdown {
      font-size: 1.1rem;
      color: var(--muted);
      margin-top: 12px;
    }

    /* ── 404 CARD ── */
    .card-404 {
      max-width: 540px;
      width: 100%;
    }
    .error-code {
      font-size: clamp(6rem, 20vw, 10rem);
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      line-height: 1;
      background: linear-gradient(135deg, var(--fire), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .error-emoji { font-size: 3rem; margin: 16px 0; }
    h1 {
      font-size: clamp(1.4rem, 4vw, 2rem);
      margin-bottom: 12px;
    }
    p {
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 32px;
    }
    .btn-home {
      display: inline-block;
      background: linear-gradient(135deg, var(--fire) 0%, #FF6B35 100%);
      color: #fff;
      padding: 14px 36px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 1rem;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .btn-home:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(232, 64, 12, 0.4);
    }
    .btn-home:focus {
      outline: 2px solid var(--gold);
      outline-offset: 4px;
    }
    footer-note {
      display: block;
      margin-top: 40px;
      font-size: 0.8rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="card-404" role="main">
    <div class="error-code" aria-label="Error 404">404</div>
    <div class="error-emoji" aria-hidden="true">🍜</div>
    <h1>Oops! This page went off the menu.</h1>
    <p>The page you're looking for doesn't exist or has been moved.<br>
       Don't worry — our food is still here. You'll be taken back to the home page shortly.</p>

    <a href="index.html" class="btn-home" id="homeBtn">🔥 Back to Flavours</a>
    <p id="countdown">Redirecting in <strong id="sec">5</strong> seconds…</p>
  </main>

  <script>
    /* Auto-redirect countdown — no browser back button needed (Unit 2, Merit M(ii)) */
    (function () {
      var remaining = 5;
      var secEl = document.getElementById('sec');

      var timer = setInterval(function () {
        remaining -= 1;
        if (secEl) secEl.textContent = remaining;
        if (remaining <= 0) {
          clearInterval(timer);
          /* Replace current history entry so back button does not return to 404 */
          window.location.replace('index.html');
        }
      }, 1000);

      /* Immediate click also replaces history entry */
      document.getElementById('homeBtn').addEventListener('click', function (e) {
        e.preventDefault();
        clearInterval(timer);
        window.location.replace('index.html');
      });
    }());
  </script>
</body>
</html>
