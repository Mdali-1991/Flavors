<svg viewBox="0 0 920 440" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="920" height="440" fill="#F6F6F6"/>
  <text x="460" y="18" text-anchor="middle" font-size="11" fill="#AAAAAA" font-weight="bold" letter-spacing="1">WIREFRAME — SECTION 4: TABLE BOOKING</text>

  <!-- Section header -->
  <text x="460" y="46" text-anchor="middle" font-size="9" fill="#AAAAAA" letter-spacing="2">RESERVATIONS</text>
  <rect x="330" y="52" width="260" height="26" fill="#E0E0E0" rx="2"/>
  <text x="460" y="70" text-anchor="middle" font-size="14" fill="#444444" font-weight="bold">Book a Table</text>
  <rect x="340" y="78" width="240" height="12" fill="#DEDEDE" rx="2"/>
  <text x="460" y="88" text-anchor="middle" font-size="9" fill="#888888">Reserve your spot at Flavours Pan Asian Food</text>

  <!-- Booking form card -->
  <rect x="160" y="100" width="600" height="300" fill="#FFFFFF" stroke="#DDDDDD" rx="8"/>

  <!-- Row 1: Name + Phone -->
  <text x="186" y="130" font-size="9" fill="#666666">Full Name *</text>
  <rect x="174" y="134" width="258" height="32" fill="#F8F8F8" stroke="#CCCCCC" rx="4"/>
  <text x="188" y="154" font-size="9" fill="#AAAAAA">Your name</text>
  <text x="458" y="130" font-size="9" fill="#666666">Phone *</text>
  <rect x="446" y="134" width="258" height="32" fill="#F8F8F8" stroke="#CCCCCC" rx="4"/>
  <text x="460" y="154" font-size="9" fill="#AAAAAA">07700 000000</text>

  <!-- Row 2: Date + Time -->
  <text x="186" y="186" font-size="9" fill="#666666">Date *</text>
  <rect x="174" y="190" width="258" height="32" fill="#F8F8F8" stroke="#CCCCCC" rx="4"/>
  <text x="188" y="210" font-size="9" fill="#AAAAAA">dd/mm/yyyy</text>
  <text x="458" y="186" font-size="9" fill="#666666">Time *  (16:30 – 22:30)</text>
  <rect x="446" y="190" width="258" height="32" fill="#F8F8F8" stroke="#CCCCCC" rx="4"/>
  <text x="460" y="210" font-size="9" fill="#AAAAAA">hh:mm</text>

  <!-- Row 3: Guests + Special Requests -->
  <text x="186" y="242" font-size="9" fill="#666666">Guests</text>
  <rect x="174" y="246" width="258" height="32" fill="#F8F8F8" stroke="#CCCCCC" rx="4"/>
  <text x="188" y="266" font-size="9" fill="#555555">2 ▼</text>
  <text x="458" y="242" font-size="9" fill="#666666">Special Requests</text>
  <rect x="446" y="246" width="258" height="32" fill="#F8F8F8" stroke="#CCCCCC" rx="4"/>
  <text x="460" y="266" font-size="9" fill="#AAAAAA">Allergies, celebration, etc.</text>

  <!-- Divider -->
  <line x1="174" y1="296" x2="730" y2="296" stroke="#EEEEEE"/>

  <!-- Submit button -->
  <rect x="174" y="308" width="540" height="40" fill="#666666" rx="20"/>
  <text x="444" y="333" text-anchor="middle" font-size="11" fill="#FFFFFF" font-weight="bold">Reserve Table</text>

  <!-- Success message placeholder -->
  <rect x="174" y="356" width="540" height="36" fill="#E8F5E9" stroke="#A5D6A7" rx="6"/>
  <text x="444" y="378" text-anchor="middle" font-size="9" fill="#388E3C">✅ Booking request received for [Name] — [guests] guests · [date] at [time]</text>

  <!-- Annotations -->
  <text x="460" y="412" text-anchor="middle" font-size="9.5" fill="#AAAAAA">HTML5 validation: required, type="date", type="time" min="16:30" max="22:30", novalidate on form</text>
  <text x="460" y="428" text-anchor="middle" font-size="9.5" fill="#AAAAAA">submitBooking() — preventDefault → validate → show inline success · event.target.reset()</text>
</svg>
