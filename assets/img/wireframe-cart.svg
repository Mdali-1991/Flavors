<svg viewBox="0 0 920 620" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="920" height="620" fill="#F6F6F6"/>
  <text x="460" y="18" text-anchor="middle" font-size="11" fill="#AAAAAA" font-weight="bold" letter-spacing="1">WIREFRAME — SECTION 3: ORDER / CART</text>

  <!-- Section header -->
  <text x="460" y="46" text-anchor="middle" font-size="9" fill="#AAAAAA" letter-spacing="2">PLACE YOUR ORDER</text>
  <rect x="310" y="52" width="300" height="26" fill="#E0E0E0" rx="2"/>
  <text x="460" y="70" text-anchor="middle" font-size="14" fill="#444444" font-weight="bold">Order Online Instantly</text>

  <!-- ── LEFT COLUMN: Cart + Form ── -->
  <!-- Card container -->
  <rect x="20" y="88" width="550" height="510" fill="#FFFFFF" stroke="#DDDDDD" rx="8"/>
  <text x="50" y="116" font-size="13" fill="#333333" font-weight="bold">Your Order</text>

  <!-- Cart items list area -->
  <rect x="36" y="124" width="518" height="130" fill="#F8F8F8" stroke="#EEEEEE" rx="4"/>
  <!-- Cart item row 1 -->
  <rect x="44" y="132" width="500" height="34" fill="#FFFFFF" stroke="#EEEEEE" rx="3"/>
  <text x="56" y="153" font-size="9" fill="#444444">2× Pad Thai (Chicken)</text>
  <text x="434" y="153" font-size="9" fill="#555555" font-weight="bold">£21.90</text>
  <rect x="504" y="137" width="24" height="24" fill="#EEEEEE" rx="12"/>
  <text x="516" y="153" text-anchor="middle" font-size="10" fill="#888888">✕</text>
  <!-- Cart item row 2 -->
  <rect x="44" y="170" width="500" height="34" fill="#FFFFFF" stroke="#EEEEEE" rx="3"/>
  <text x="56" y="191" font-size="9" fill="#444444">1× Prawn Crackers</text>
  <text x="434" y="191" font-size="9" fill="#555555" font-weight="bold">£3.95</text>
  <rect x="504" y="175" width="24" height="24" fill="#EEEEEE" rx="12"/>
  <text x="516" y="191" text-anchor="middle" font-size="10" fill="#888888">✕</text>
  <!-- Cart item row 3 -->
  <rect x="44" y="208" width="500" height="34" fill="#FFFFFF" stroke="#EEEEEE" rx="3"/>
  <text x="56" y="229" font-size="9" fill="#444444">1× Thai Green Curry (Prawn)</text>
  <text x="434" y="229" font-size="9" fill="#555555" font-weight="bold">£12.95</text>
  <rect x="504" y="213" width="24" height="24" fill="#EEEEEE" rx="12"/>
  <text x="516" y="229" text-anchor="middle" font-size="10" fill="#888888">✕</text>

  <!-- Cart total -->
  <rect x="36" y="260" width="518" height="36" fill="#F0F0F0" stroke="#E0E0E0" rx="4"/>
  <text x="50" y="282" font-size="11" fill="#444444" font-weight="bold">Total:</text>
  <text x="530" y="282" text-anchor="end" font-size="13" fill="#333333" font-weight="bold">£38.80</text>

  <!-- Divider -->
  <line x1="36" y1="310" x2="554" y2="310" stroke="#EEEEEE"/>

  <!-- Form fields -->
  <text x="50" y="332" font-size="11" fill="#444444" font-weight="bold">Your Details</text>

  <!-- Name -->
  <text x="50" y="354" font-size="9" fill="#666666">Full Name</text>
  <rect x="36" y="358" width="240" height="28" fill="#F8F8F8" stroke="#CCCCCC" rx="4"/>
  <text x="50" y="376" font-size="9" fill="#AAAAAA">Jane Smith</text>
  <!-- Phone -->
  <text x="300" y="354" font-size="9" fill="#666666">Phone</text>
  <rect x="286" y="358" width="240" height="28" fill="#F8F8F8" stroke="#CCCCCC" rx="4"/>
  <text x="300" y="376" font-size="9" fill="#AAAAAA">07700 000000</text>
  <!-- Email -->
  <text x="50" y="402" font-size="9" fill="#666666">Email</text>
  <rect x="36" y="406" width="240" height="28" fill="#F8F8F8" stroke="#CCCCCC" rx="4"/>
  <text x="50" y="424" font-size="9" fill="#AAAAAA">you@email.com</text>
  <!-- Order type -->
  <text x="300" y="402" font-size="9" fill="#666666">Order Type</text>
  <rect x="286" y="406" width="240" height="28" fill="#F8F8F8" stroke="#CCCCCC" rx="4"/>
  <text x="300" y="424" font-size="9" fill="#555555">Delivery (Free within 3 miles) ▼</text>
  <!-- Address -->
  <text x="50" y="450" font-size="9" fill="#666666">Delivery Address</text>
  <rect x="36" y="454" width="490" height="28" fill="#F8F8F8" stroke="#CCCCCC" rx="4"/>
  <text x="50" y="472" font-size="9" fill="#AAAAAA">9 Pier Road, London E16…</text>
  <!-- Notes -->
  <text x="50" y="498" font-size="9" fill="#666666">Special Instructions</text>
  <rect x="36" y="502" width="490" height="42" fill="#F8F8F8" stroke="#CCCCCC" rx="4"/>
  <text x="50" y="520" font-size="9" fill="#AAAAAA">Allergies, spice level, etc.</text>

  <!-- Payment buttons -->
  <rect x="36" y="556" width="490" height="34" fill="#666666" rx="17"/>
  <text x="281" y="577" text-anchor="middle" font-size="10" fill="#FFFFFF" font-weight="bold">💳 Pay by Card (Stripe)</text>
  <rect x="36" y="594" width="490" height="34" fill="none" stroke="#888888" stroke-width="2" rx="17"/>
  <text x="281" y="615" text-anchor="middle" font-size="10" fill="#666666" font-weight="bold">💵 Pay Cash on Collection/Delivery</text>

  <!-- Stripe card element placeholder (hidden until Pay by Card clicked) -->
  <text x="44" y="635" font-size="8" fill="#AAAAAA">▲ Stripe card element mounts below Pay button on click (initially hidden)</text>

  <!-- ── RIGHT COLUMN: Info cards ── -->
  <rect x="590" y="88" width="310" height="120" fill="#FFFFFF" stroke="#DDDDDD" rx="8"/>
  <text x="614" y="110" font-size="11" fill="#444444" font-weight="bold">🕐 Opening Hours</text>
  <text x="614" y="128" font-size="9" fill="#666666">Monday – Sunday</text>
  <text x="614" y="144" font-size="10" fill="#333333" font-weight="bold">4:30 PM – 11:00 PM</text>
  <rect x="614" y="158" width="260" height="12" fill="#EEEEEE" rx="2"/>

  <rect x="590" y="218" width="310" height="110" fill="#FFFFFF" stroke="#DDDDDD" rx="8"/>
  <text x="614" y="240" font-size="11" fill="#444444" font-weight="bold">🚚 Delivery Info</text>
  <text x="614" y="258" font-size="9" fill="#666666">Free delivery within 3 miles</text>
  <text x="614" y="274" font-size="9" fill="#666666">Min order £20 · £2 charge below</text>
  <rect x="614" y="285" width="200" height="10" fill="#EEEEEE" rx="2"/>
  <rect x="614" y="300" width="150" height="10" fill="#EEEEEE" rx="2"/>

  <rect x="590" y="338" width="310" height="110" fill="#FFFFFF" stroke="#DDDDDD" rx="8"/>
  <text x="614" y="360" font-size="11" fill="#444444" font-weight="bold">📍 Collection</text>
  <text x="614" y="378" font-size="9" fill="#666666">9 Pier Road, London E16 2JJ</text>
  <text x="614" y="394" font-size="9" fill="#666666">10% off orders over £20</text>
  <rect x="614" y="405" width="220" height="10" fill="#EEEEEE" rx="2"/>
  <rect x="614" y="420" width="160" height="10" fill="#EEEEEE" rx="2"/>

  <rect x="590" y="458" width="310" height="70" fill="#FFFFFF" stroke="#DDDDDD" rx="8"/>
  <text x="614" y="480" font-size="11" fill="#444444" font-weight="bold">📞 Call Us</text>
  <rect x="614" y="488" width="200" height="26" fill="#EEEEEE" rx="4"/>
  <text x="714" y="506" text-anchor="middle" font-size="12" fill="#555555" font-weight="bold">020 3883 9233</text>

  <!-- Form annotation -->
  <text x="460" y="600" text-anchor="middle" font-size="9" fill="#AAAAAA">validateOrder() checks cart non-empty, name/phone/email present, valid email pattern, delivery address if type=delivery</text>
</svg>
