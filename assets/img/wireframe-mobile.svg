  <text x="460" y="440" text-anchor="middle" font-size="10" fill="#555555" font-weight="bold">Mobile Breakpoints</text>
  <text x="460" y="458" text-anchor="middle" font-size="9" fill="#777777">&lt;768px: hamburger nav · hero content stacks · about-grid single column   |   &lt;576px: menu tabs scroll horizontal · form rows stack · cart full-width</text>

